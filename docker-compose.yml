version: '3.8'

services:
  valhalla-gym-backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: valhalla-gym-backend
    restart: unless-stopped
    ports:
      - "5000:5000"
    environment:
      - PORT=5000
      - NODE_ENV=production
      - DATABASE_PATH=/data/valhalla.sqlite
      - JWT_SECRET=valhalla_mystic_key_12345  # ¡Cámbiala por una segura en producción!
      - CORS_ORIGIN=http://localhost,http://localhost:80,http://localhost:5173  # Permitir origen del frontend en puerto 80 y localhost sin puerto
    volumes:
      - valhalla-db-data:/data

  valhalla-gym-frontend:
    build:
      context: ../ValhalaGym
      dockerfile: Dockerfile
    container_name: valhalla-gym-frontend
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - valhalla-gym-backend

volumes:
  valhalla-db-data:
    driver: local
